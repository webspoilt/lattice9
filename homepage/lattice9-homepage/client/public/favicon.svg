<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="12" fill="#0a0a0b"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="24" stroke="#4a9eff" stroke-width="1.5" opacity="0.3"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="16" stroke="#4a9eff" stroke-width="1" opacity="0.2"/>
  <!-- Crosshair -->
  <line x1="32" y1="6" x2="32" y2="14" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
  <line x1="32" y1="50" x2="32" y2="58" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
  <line x1="6" y1="32" x2="14" y2="32" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
  <line x1="50" y1="32" x2="58" y2="32" stroke="#4a9eff" stroke-width="1.5" opacity="0.4"/>
  <!-- Center node -->
  <circle cx="32" cy="32" r="4" fill="#4a9eff" opacity="0.9"/>
  <!-- Graph nodes -->
  <circle cx="20" cy="20" r="2.5" fill="#4a9eff" opacity="0.5"/>
  <circle cx="44" cy="20" r="2.5" fill="#d4a574" opacity="0.5"/>
  <circle cx="20" cy="44" r="2.5" fill="#00d9ff" opacity="0.5"/>
  <circle cx="44" cy="44" r="2.5" fill="#4a9eff" opacity="0.5"/>
  <!-- Graph edges -->
  <line x1="32" y1="32" x2="20" y2="20" stroke="#4a9eff" stroke-width="0.8" opacity="0.25"/>
  <line x1="32" y1="32" x2="44" y2="20" stroke="#d4a574" stroke-width="0.8" opacity="0.25"/>
  <line x1="32" y1="32" x2="20" y2="44" stroke="#00d9ff" stroke-width="0.8" opacity="0.25"/>
  <line x1="32" y1="32" x2="44" y2="44" stroke="#4a9eff" stroke-width="0.8" opacity="0.25"/>
</svg>
