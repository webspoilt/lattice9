<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@page { size: 1200px auto; margin: 0; }
html, body { margin: 0; padding: 0; width: 1200px; background: #fff; }
* { box-sizing: border-box; }
body { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace; }
svg text { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace; }
</style>
</head>
<body>
<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#888" stroke-width="0.8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#fff"/>

  <!-- Title -->
  <text x="600" y="28" text-anchor="middle" font-size="11" fill="#2c3e6b" font-weight="bold" letter-spacing="2">LATTICE9 — SYSTEM ARCHITECTURE</text>
  <line x1="80" y1="38" x2="1120" y2="38" stroke="#ccc" stroke-width="0.5"/>

  <!-- Tier Labels (left side) -->
  <text x="22" y="105" font-size="8" fill="#888" transform="rotate(-90,22,105)" letter-spacing="1">CLIENT</text>
  <text x="22" y="260" font-size="8" fill="#888" transform="rotate(-90,22,260)" letter-spacing="1">GATEWAY</text>
  <text x="22" y="435" font-size="8" fill="#888" transform="rotate(-90,22,435)" letter-spacing="1">ENGINE</text>
  <text x="22" y="600" font-size="8" fill="#888" transform="rotate(-90,22,600)" letter-spacing="1">STORAGE</text>
  <text x="22" y="745" font-size="8" fill="#888" transform="rotate(-90,22,745)" letter-spacing="1">WORKER</text>

  <!-- Tier separator lines -->
  <line x1="50" y1="165" x2="1150" y2="165" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="50" y1="320" x2="1150" y2="320" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="50" y1="510" x2="1150" y2="510" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="50" y1="660" x2="1150" y2="660" stroke="#e0e0e0" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- CLIENT TIER -->
  <rect x="350" y="60" width="500" height="80" rx="4" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="600" y="92" text-anchor="middle" font-size="11" fill="#000" font-weight="bold">Analyst Monospace Workspace</text>
  <text x="600" y="108" text-anchor="middle" font-size="9" fill="#888">React · TypeScript · Re-graph Client</text>
  <text x="600" y="124" text-anchor="middle" font-size="8" fill="#aaa">query · mutation · subscription</text>

  <!-- GATEWAY TIER -->
  <rect x="300" y="195" width="600" height="100" rx="4" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="600" y="222" text-anchor="middle" font-size="11" fill="#000" font-weight="bold">tRPC Node.js API Gateway</text>
  <text x="600" y="240" text-anchor="middle" font-size="9" fill="#888">Session Management · Rate Limiting · Audit Log</text>
  <!-- Inner function box -->
  <rect x="380" y="255" width="440" height="26" rx="3" fill="#f5f5f5" stroke="#999" stroke-width="0.5"/>
  <text x="600" y="272" text-anchor="middle" font-size="9" fill="#2c3e6b" font-style="italic">verifyEngagementAccess(ctx, engagementId)</text>

  <!-- ENGINE TIER -->
  <rect x="150" y="345" width="900" height="140" rx="4" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="600" y="370" text-anchor="middle" font-size="11" fill="#000" font-weight="bold">Python FastAPI Engine</text>
  <text x="600" y="385" text-anchor="middle" font-size="8" fill="#888">core/ · solvers/ · evidence/ · field/</text>

  <!-- Engine sub-modules -->
  <rect x="195" y="400" width="240" height="65" rx="3" fill="#f9f9f9" stroke="#000" stroke-width="0.5"/>
  <text x="315" y="420" text-anchor="middle" font-size="10" fill="#000">Graph Field Module</text>
  <text x="315" y="435" text-anchor="middle" font-size="8" fill="#888">gradient · topology · mutation</text>
  <text x="315" y="450" text-anchor="middle" font-size="7" fill="#aaa">field.py · types.py</text>

  <rect x="475" y="400" width="250" height="65" rx="3" fill="#f9f9f9" stroke="#000" stroke-width="0.5"/>
  <text x="600" y="420" text-anchor="middle" font-size="10" fill="#000">Bayesian Solvers</text>
  <text x="600" y="435" text-anchor="middle" font-size="8" fill="#888">belief_prop · inference · marginal</text>
  <text x="600" y="450" text-anchor="middle" font-size="7" fill="#aaa">solver.py · network.py</text>

  <rect x="765" y="400" width="240" height="65" rx="3" fill="#f9f9f9" stroke="#000" stroke-width="0.5"/>
  <text x="885" y="420" text-anchor="middle" font-size="10" fill="#000">Evidence Module</text>
  <text x="885" y="435" text-anchor="middle" font-size="8" fill="#888">lineage · provenance · chain</text>
  <text x="885" y="450" text-anchor="middle" font-size="7" fill="#aaa">evidence.py · dag.py</text>

  <!-- STORAGE TIER -->
  <rect x="170" y="545" width="280" height="85" rx="4" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="310" y="572" text-anchor="middle" font-size="10" fill="#000" font-weight="bold">Neo4j</text>
  <text x="310" y="588" text-anchor="middle" font-size="8" fill="#888">Graph Store · Cypher</text>
  <text x="310" y="603" text-anchor="middle" font-size="7" fill="#aaa">nodes · edges · paths</text>
  <text x="310" y="618" text-anchor="middle" font-size="7" fill="#aaa">bolt://7687</text>

  <rect x="460" y="545" width="280" height="85" rx="4" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="600" y="572" text-anchor="middle" font-size="10" fill="#000" font-weight="bold">PostgreSQL</text>
  <text x="600" y="588" text-anchor="middle" font-size="8" fill="#888">Relational Store · SQL</text>
  <text x="600" y="603" text-anchor="middle" font-size="7" fill="#aaa">engagements · users · evidence</text>
  <text x="600" y="618" text-anchor="middle" font-size="7" fill="#aaa">5432/tcp</text>

  <rect x="750" y="545" width="280" height="85" rx="4" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="890" y="572" text-anchor="middle" font-size="10" fill="#000" font-weight="bold">Redis</text>
  <text x="890" y="588" text-anchor="middle" font-size="8" fill="#888">Cache · Pub/Sub · Task Queue</text>
  <text x="890" y="603" text-anchor="middle" font-size="7" fill="#aaa">mutations · gradients · locks</text>
  <text x="890" y="618" text-anchor="middle" font-size="7" fill="#aaa">6379/tcp</text>

  <!-- WORKER TIER -->
  <rect x="250" y="700" width="180" height="55" rx="4" fill="#f5f5f5" stroke="#000" stroke-width="1"/>
  <text x="340" y="722" text-anchor="middle" font-size="9" fill="#000">Worker Node 1</text>
  <text x="340" y="738" text-anchor="middle" font-size="7" fill="#888">solver · field · evidence</text>

  <rect x="510" y="700" width="180" height="55" rx="4" fill="#f5f5f5" stroke="#000" stroke-width="1"/>
  <text x="600" y="722" text-anchor="middle" font-size="9" fill="#000">Worker Node 2</text>
  <text x="600" y="738" text-anchor="middle" font-size="7" fill="#888">solver · field · evidence</text>

  <rect x="770" y="700" width="180" height="55" rx="4" fill="#f5f5f5" stroke="#000" stroke-width="1"/>
  <text x="860" y="722" text-anchor="middle" font-size="9" fill="#000">Worker Node 3</text>
  <text x="860" y="738" text-anchor="middle" font-size="7" fill="#888">solver · field · evidence</text>

  <!-- Redis task dispatch label -->
  <text x="600" y="790" text-anchor="middle" font-size="8" fill="#888" letter-spacing="1">↑ Redis Task Dispatch ↑</text>

  <!-- ARROWS: Client → Gateway -->
  <line x1="600" y1="140" x2="600" y2="195" stroke="#888" stroke-width="1" marker-end="url(#arrowGray)"/>
  <text x="615" y="172" font-size="7" fill="#aaa">tRPC</text>

  <!-- ARROWS: Gateway → Engine -->
  <line x1="600" y1="295" x2="600" y2="345" stroke="#888" stroke-width="1" marker-end="url(#arrowGray)"/>
  <text x="615" y="324" font-size="7" fill="#aaa">REST/gRPC</text>

  <!-- ARROWS: Engine → Storage -->
  <line x1="310" y1="485" x2="310" y2="545" stroke="#888" stroke-width="1" marker-end="url(#arrowGray)"/>
  <text x="265" y="520" font-size="7" fill="#aaa">bolt</text>

  <line x1="600" y1="485" x2="600" y2="545" stroke="#888" stroke-width="1" marker-end="url(#arrowGray)"/>
  <text x="615" y="520" font-size="7" fill="#aaa">SQL</text>

  <line x1="890" y1="485" x2="890" y2="545" stroke="#888" stroke-width="1" marker-end="url(#arrowGray)"/>
  <text x="900" y="520" font-size="7" fill="#aaa">resp</text>

  <!-- ARROWS: Redis → Workers -->
  <line x1="820" y1="630" x2="600" y2="700" stroke="#888" stroke-width="1" marker-end="url(#arrowGray)" stroke-dasharray="4,2"/>
  <line x1="850" y1="630" x2="860" y2="700" stroke="#888" stroke-width="1" marker-end="url(#arrowGray)" stroke-dasharray="4,2"/>
  <line x1="835" y1="630" x2="340" y2="700" stroke="#888" stroke-width="1" marker-end="url(#arrowGray)" stroke-dasharray="4,2"/>

  <!-- Footer -->
  <line x1="80" y1="805" x2="1120" y2="805" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="600" y="816" text-anchor="middle" font-size="7" fill="#bbb">Lattice9 v0.1.0 · DARPA Research Prototype</text>
</svg>

</html>
