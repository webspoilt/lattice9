<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@page { size: 1200px auto; margin: 0; }
html, body { margin: 0; padding: 0; width: 1200px; background: #fff; }
* { box-sizing: border-box; }
body { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace; }
svg text { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace; }
</style>
</head>
<body>
<svg width="1200" height="680" viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowG" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#999" stroke-width="0.7"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="#fff"/>

  <!-- Title -->
  <text x="600" y="26" text-anchor="middle" font-size="11" fill="#2c3e6b" font-weight="bold" letter-spacing="2">BAYESIAN BELIEF PROPAGATION — POSTERIOR INFERENCE</text>
  <line x1="80" y1="36" x2="1120" y2="36" stroke="#ccc" stroke-width="0.5"/>

  <!-- Legend -->
  <rect x="940" y="48" width="240" height="60" rx="2" fill="none" stroke="#ccc" stroke-width="0.5"/>
  <text x="955" y="63" font-size="8" fill="#888" letter-spacing="1">LEGEND</text>
  <circle cx="960" cy="78" r="8" fill="none" stroke="#000" stroke-width="1.5"/>
  <circle cx="960" cy="78" r="5" fill="none" stroke="#000" stroke-width="1" stroke-dasharray="2,1"/>
  <text x="975" y="81" font-size="7" fill="#666">inner=prior (solid) outer=posterior (dashed)</text>
  <text x="955" y="100" font-size="7" fill="#888">P(B|A) = conditional probability on edge</text>

  <!-- NODE POSITIONS (hierarchical 3 levels):
    Level 1 (y=150): INITIAL_COMPROMISE
    Level 2 (y=320): CREDENTIAL_THEFT, C2_ESTABLISH
    Level 3 (y=490): PRIVILEGE_ESC, PERSISTENCE, DEFENSE_EVASION
    Level 4 (y=620): LATERAL_SPREAD, DATA_EXFIL
  -->

  <!-- EDGES (draw before nodes so nodes overlay) -->
  <!-- INITIAL_COMPROMISE → CREDENTIAL_THEFT (0.85) -->
  <path d="M300,190 Q280,250 280,290" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="235" y="245" font-size="7" fill="#888">P=0.85</text>

  <!-- INITIAL_COMPROMISE → C2_ESTABLISH (0.88) -->
  <path d="M380,190 Q500,250 620,290" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="480" y="228" font-size="7" fill="#888">P=0.88</text>

  <!-- CREDENTIAL_THEFT → PRIVILEGE_ESC (0.78) -->
  <path d="M240,360 Q200,410 180,440" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="170" y="400" font-size="7" fill="#888">P=0.78</text>

  <!-- CREDENTIAL_THEFT → PERSISTENCE (0.81) -->
  <path d="M320,360 Q400,410 450,440" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="380" y="395" font-size="7" fill="#888">P=0.81</text>

  <!-- C2_ESTABLISH → DEFENSE_EVASION (0.76) -->
  <path d="M670,360 Q720,410 760,440" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="720" y="395" font-size="7" fill="#888">P=0.76</text>

  <!-- PERSISTENCE → LATERAL_SPREAD (0.69) -->
  <path d="M420,510 Q360,550 320,570" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="330" y="545" font-size="7" fill="#888">P=0.69</text>

  <!-- PRIVILEGE_ESC → LATERAL_SPREAD (0.72) -->
  <path d="M180,510 Q220,550 260,570" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="190" y="545" font-size="7" fill="#888">P=0.72</text>

  <!-- LATERAL_SPREAD → DATA_EXFIL (0.65) -->
  <path d="M340,610 Q460,625 580,610" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="450" y="628" font-size="7" fill="#888">P=0.65</text>

  <!-- DEFENSE_EVASION → DATA_EXFIL (0.58) -->
  <path d="M740,510 Q720,560 680,585" fill="none" stroke="#999" stroke-width="1" marker-end="url(#arrowG)"/>
  <text x="730" y="555" font-size="7" fill="#888">P=0.58</text>

  <!-- NODES -->
  <!-- INITIAL_COMPROMISE (prior=0.15, posterior=0.87) at (330, 160) -->
  <g>
    <!-- Posterior ring (dashed) -->
    <circle cx="330" cy="160" r="38" fill="none" stroke="#2c3e6b" stroke-width="1.2" stroke-dasharray="4,2"/>
    <!-- Prior ring (solid) -->
    <circle cx="330" cy="160" r="22" fill="none" stroke="#000" stroke-width="1.5"/>
    <!-- Fill proportional -->
    <circle cx="330" cy="160" r="22" fill="#f0f0f0"/>
    <circle cx="330" cy="160" r="3.3" fill="#000"/> <!-- 0.15*22 ≈ 3.3 -->

    <text x="330" y="145" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">INITIAL_</text>
    <text x="330" y="155" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">COMPROMISE</text>
    <text x="330" y="168" text-anchor="middle" font-size="7" fill="#888">π=0.15</text>
    <text x="330" y="178" text-anchor="middle" font-size="7" fill="#2c3e6b">P=0.87</text>
  </g>

  <!-- CREDENTIAL_THEFT (prior=0.25, posterior=0.76) at (280, 330) -->
  <g>
    <circle cx="280" cy="330" r="38" fill="none" stroke="#2c3e6b" stroke-width="1.2" stroke-dasharray="4,2"/>
    <circle cx="280" cy="330" r="22" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <circle cx="280" cy="330" r="5.5" fill="#000"/>
    <text x="280" y="315" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">CREDENTIAL_</text>
    <text x="280" y="325" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">THEFT</text>
    <text x="280" y="338" text-anchor="middle" font-size="7" fill="#888">π=0.25</text>
    <text x="280" y="348" text-anchor="middle" font-size="7" fill="#2c3e6b">P=0.76</text>
  </g>

  <!-- C2_ESTABLISH (prior=0.22, posterior=0.79) at (650, 330) -->
  <g>
    <circle cx="650" cy="330" r="38" fill="none" stroke="#2c3e6b" stroke-width="1.2" stroke-dasharray="4,2"/>
    <circle cx="650" cy="330" r="22" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <circle cx="650" cy="330" r="4.84" fill="#000"/>
    <text x="650" y="315" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">C2_</text>
    <text x="650" y="325" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">ESTABLISH</text>
    <text x="650" y="338" text-anchor="middle" font-size="7" fill="#888">π=0.22</text>
    <text x="650" y="348" text-anchor="middle" font-size="7" fill="#2c3e6b">P=0.79</text>
  </g>

  <!-- PRIVILEGE_ESC (prior=0.18, posterior=0.69) at (170, 480) -->
  <g>
    <circle cx="170" cy="480" r="38" fill="none" stroke="#2c3e6b" stroke-width="1.2" stroke-dasharray="4,2"/>
    <circle cx="170" cy="480" r="22" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <circle cx="170" cy="480" r="3.96" fill="#000"/>
    <text x="170" y="465" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">PRIVILEGE_</text>
    <text x="170" y="475" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">ESC</text>
    <text x="170" y="488" text-anchor="middle" font-size="7" fill="#888">π=0.18</text>
    <text x="170" y="498" text-anchor="middle" font-size="7" fill="#2c3e6b">P=0.69</text>
  </g>

  <!-- PERSISTENCE (prior=0.20, posterior=0.72) at (460, 480) -->
  <g>
    <circle cx="460" cy="480" r="38" fill="none" stroke="#2c3e6b" stroke-width="1.2" stroke-dasharray="4,2"/>
    <circle cx="460" cy="480" r="22" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <circle cx="460" cy="480" r="4.4" fill="#000"/>
    <text x="460" y="472" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">PERSISTENCE</text>
    <text x="460" y="488" text-anchor="middle" font-size="7" fill="#888">π=0.20</text>
    <text x="460" y="498" text-anchor="middle" font-size="7" fill="#2c3e6b">P=0.72</text>
  </g>

  <!-- DEFENSE_EVASION (prior=0.16, posterior=0.63) at (770, 480) -->
  <g>
    <circle cx="770" cy="480" r="38" fill="none" stroke="#2c3e6b" stroke-width="1.2" stroke-dasharray="4,2"/>
    <circle cx="770" cy="480" r="22" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <circle cx="770" cy="480" r="3.52" fill="#000"/>
    <text x="770" y="465" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">DEFENSE_</text>
    <text x="770" y="475" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">EVASION</text>
    <text x="770" y="488" text-anchor="middle" font-size="7" fill="#888">π=0.16</text>
    <text x="770" y="498" text-anchor="middle" font-size="7" fill="#2c3e6b">P=0.63</text>
  </g>

  <!-- LATERAL_SPREAD (prior=0.12, posterior=0.58) at (290, 600) -->
  <g>
    <circle cx="290" cy="600" r="38" fill="none" stroke="#2c3e6b" stroke-width="1.2" stroke-dasharray="4,2"/>
    <circle cx="290" cy="600" r="22" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <circle cx="290" cy="600" r="2.64" fill="#000"/>
    <text x="290" y="592" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">LATERAL_SPREAD</text>
    <text x="290" y="608" text-anchor="middle" font-size="7" fill="#888">π=0.12</text>
    <text x="290" y="618" text-anchor="middle" font-size="7" fill="#2c3e6b">P=0.58</text>
  </g>

  <!-- DATA_EXFIL (prior=0.08, posterior=0.41) at (640, 600) -->
  <g>
    <circle cx="640" cy="600" r="38" fill="none" stroke="#2c3e6b" stroke-width="1.2" stroke-dasharray="4,2"/>
    <circle cx="640" cy="600" r="22" fill="#f0f0f0" stroke="#000" stroke-width="1.5"/>
    <circle cx="640" cy="600" r="1.76" fill="#000"/>
    <text x="640" y="592" text-anchor="middle" font-size="8" fill="#000" font-weight="bold">DATA_EXFIL</text>
    <text x="640" y="608" text-anchor="middle" font-size="7" fill="#888">π=0.08</text>
    <text x="640" y="618" text-anchor="middle" font-size="7" fill="#2c3e6b">P=0.41</text>
  </g>

  <!-- Level labels on right -->
  <text x="920" y="160" font-size="7" fill="#ccc" letter-spacing="1">LEVEL 0 — INITIAL ACCESS</text>
  <text x="920" y="330" font-size="7" fill="#ccc" letter-spacing="1">LEVEL 1 — ESTABLISHMENT</text>
  <text x="920" y="480" font-size="7" fill="#ccc" letter-spacing="1">LEVEL 2 — ESCALATION</text>
  <text x="920" y="600" font-size="7" fill="#ccc" letter-spacing="1">LEVEL 3 — OBJECTIVE</text>

  <!-- Inference formula -->
  <text x="80" y="665" font-size="7" fill="#aaa">P(X|E) = α · π(X) · ∏ P(X|Pa(X)) · λ(X)</text>
  <text x="600" y="665" font-size="7" fill="#aaa">8 belief nodes · 9 conditional edges · Belief propagation converged in 4 iterations</text>

  <line x1="80" y1="672" x2="1120" y2="672" stroke="#e0e0e0" stroke-width="0.5"/>
</svg>
</body>
</html>
