<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@page { size: 1200px auto; margin: 0; }
html, body { margin: 0; padding: 0; width: 1200px; background: #fff; }
* { box-sizing: border-box; }
body { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace; }
svg text { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace; }
</style>
</head>
<body>

  <!-- Priority path highlight -->
  <text x="80" y="680" font-size="7" fill="#bbb">Highest-weight path: WEB-01 → APP-02 → DB-03 → AD-CTRL (Σw=2.65)</text>

  <!-- Footer -->
  <line x1="80" y1="690" x2="1120" y2="690" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="600" y="698" text-anchor="middle" font-size="7" fill="#bbb">Lattice9 Attack Path Model · 10 nodes · 11 edges · Directed Weighted Graph</text>
</svg>
</body>
</html>
