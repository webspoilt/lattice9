<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
@page { size: 1200px auto; margin: 0; }
html, body { margin: 0; padding: 0; width: 1200px; background: #fff; }
* { box-sizing: border-box; }
body { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace; }
svg text { font-family: 'JetBrains Mono', 'Fira Code', 'SF Mono', 'Consolas', monospace; }
</style>
</head>
<body>
<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#999" stroke-width="0.7"/>
    </marker>
    <marker id="arrowFeedback" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#2c3e6b" stroke-width="0.7"/>
    </marker>
  </defs>

  <rect width="1200" height="520" fill="#fff"/>

  <!-- Title -->
  <text x="600" y="26" text-anchor="middle" font-size="11" fill="#2c3e6b" font-weight="bold" letter-spacing="2">EVENT-DRIVEN MUTATION PIPELINE</text>
  <line x1="80" y1="36" x2="1120" y2="36" stroke="#ccc" stroke-width="0.5"/>

  <!-- ===== TOP: Main Pipeline ===== -->
  <text x="600" y="62" text-anchor="middle" font-size="9" fill="#888" letter-spacing="1">GRAPH MUTATION PIPELINE</text>

  <!-- Stage 1: Signal Ingestion -->
  <rect x="40" y="80" width="180" height="80" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="130" y="102" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">Signal Ingestion</text>
  <line x1="60" y1="110" x2="200" y2="110" stroke="#eee" stroke-width="0.5"/>
  <text x="130" y="125" text-anchor="middle" font-size="7" fill="#888">TCP/UDP listeners</text>
  <text x="130" y="137" text-anchor="middle" font-size="7" fill="#888">webhook receivers</text>
  <text x="130" y="149" text-anchor="middle" font-size="7" fill="#aaa">sig://ingest</text>

  <!-- Arrow 1→2 -->
  <line x1="220" y1="120" x2="278" y2="120" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="249" y="113" text-anchor="middle" font-size="6" fill="#aaa">raw</text>

  <!-- Stage 2: Regex/AST Parser -->
  <rect x="280" y="80" width="180" height="80" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="370" y="102" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">Regex/AST Parser</text>
  <line x1="300" y1="110" x2="440" y2="110" stroke="#eee" stroke-width="0.5"/>
  <text x="370" y="125" text-anchor="middle" font-size="7" fill="#888">pattern extraction</text>
  <text x="370" y="137" text-anchor="middle" font-size="7" fill="#888">AST normalization</text>
  <text x="370" y="149" text-anchor="middle" font-size="7" fill="#aaa">parse.transform()</text>

  <!-- Arrow 2→3 -->
  <line x1="460" y1="120" x2="518" y2="120" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="489" y="113" text-anchor="middle" font-size="6" fill="#aaa">events</text>

  <!-- Stage 3: Redis Mutation Stream -->
  <rect x="520" y="80" width="180" height="80" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="610" y="102" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">Redis Stream</text>
  <line x1="540" y1="110" x2="680" y2="110" stroke="#eee" stroke-width="0.5"/>
  <text x="610" y="125" text-anchor="middle" font-size="7" fill="#888">XADD mutation events</text>
  <text x="610" y="137" text-anchor="middle" font-size="7" fill="#888">consumer groups</text>
  <text x="610" y="149" text-anchor="middle" font-size="7" fill="#aaa">XREAD BLOCK 5000</text>

  <!-- Arrow 3→4 -->
  <line x1="700" y1="120" x2="758" y2="120" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="729" y="113" text-anchor="middle" font-size="6" fill="#aaa">stream</text>

  <!-- Stage 4: Neo4j Transaction Worker -->
  <rect x="760" y="80" width="190" height="80" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="855" y="102" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">Neo4j Tx Worker</text>
  <line x1="780" y1="110" x2="930" y2="110" stroke="#eee" stroke-width="0.5"/>
  <text x="855" y="125" text-anchor="middle" font-size="7" fill="#888">BATCH MERGE nodes</text>
  <text x="855" y="137" text-anchor="middle" font-size="7" fill="#888">transactional writes</text>
  <text x="855" y="149" text-anchor="middle" font-size="7" fill="#aaa">bolt://neo4j:7687</text>

  <!-- Arrow 4→5 -->
  <line x1="950" y1="120" x2="1008" y2="120" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="979" y="113" text-anchor="middle" font-size="6" fill="#aaa">commit</text>

  <!-- Stage 5: Recalculate Field Gradients -->
  <rect x="1010" y="80" width="160" height="80" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="1090" y="102" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">Field Gradients</text>
  <line x1="1025" y1="110" x2="1155" y2="110" stroke="#eee" stroke-width="0.5"/>
  <text x="1090" y="125" text-anchor="middle" font-size="7" fill="#888">recalculate ∇φ</text>
  <text x="1090" y="137" text-anchor="middle" font-size="7" fill="#888">topology update</text>
  <text x="1090" y="149" text-anchor="middle" font-size="7" fill="#aaa">field.recompute()</text>

  <!-- FEEDBACK LOOP: Field Gradients → Signal Ingestion -->
  <path d="M1090,160 L1090,195 Q1090,210 1070,210 L150,210 Q130,210 130,195 L130,160" 
        fill="none" stroke="#2c3e6b" stroke-width="0.8" stroke-dasharray="4,2" marker-end="url(#arrowFeedback)"/>
  <text x="600" y="222" text-anchor="middle" font-size="7" fill="#2c3e6b">feedback loop — gradient influence on signal prioritization</text>

  <!-- ===== BOTTOM: Worker Architecture ===== -->
  <line x1="40" y1="248" x2="1160" y2="248" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="600" y="275" text-anchor="middle" font-size="9" fill="#888" letter-spacing="1">WORKER ARCHITECTURE</text>

  <!-- Planner Agent -->
  <rect x="80" y="300" width="220" height="90" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="190" y="325" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">Planner Agent</text>
  <line x1="100" y1="333" x2="280" y2="333" stroke="#eee" stroke-width="0.5"/>
  <text x="190" y="350" text-anchor="middle" font-size="7" fill="#888">task decomposition</text>
  <text x="190" y="362" text-anchor="middle" font-size="7" fill="#888">dependency resolution</text>
  <text x="190" y="374" text-anchor="middle" font-size="7" fill="#888">priority scheduling</text>
  <text x="190" y="386" text-anchor="middle" font-size="7" fill="#aaa">planner.plan(mutations)</text>

  <!-- Arrow Planner → Task DAG -->
  <line x1="300" y1="345" x2="358" y2="345" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Task DAG Queue -->
  <rect x="360" y="300" width="220" height="90" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="470" y="325" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">Task DAG Queue</text>
  <line x1="380" y1="333" x2="560" y2="333" stroke="#eee" stroke-width="0.5"/>
  <text x="470" y="350" text-anchor="middle" font-size="7" fill="#888">topological sort</text>
  <text x="470" y="362" text-anchor="middle" font-size="7" fill="#888">ready set extraction</text>
  <text x="470" y="374" text-anchor="middle" font-size="7" fill="#888">completion tracking</text>
  <text x="470" y="386" text-anchor="middle" font-size="7" fill="#aaa">dag.schedule(tasks)</text>

  <!-- Arrow Task DAG → Redis Task Broker -->
  <line x1="580" y1="345" x2="638" y2="345" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Redis Task Broker -->
  <rect x="640" y="300" width="220" height="90" rx="3" fill="#fff" stroke="#000" stroke-width="1"/>
  <text x="750" y="325" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">Redis Task Broker</text>
  <line x1="660" y1="333" x2="840" y2="333" stroke="#eee" stroke-width="0.5"/>
  <text x="750" y="350" text-anchor="middle" font-size="7" fill="#888">LPUSH task queues</text>
  <text x="750" y="362" text-anchor="middle" font-size="7" fill="#888">BRPOP consumer</text>
  <text x="750" y="374" text-anchor="middle" font-size="7" fill="#888">retry / dead-letter</text>
  <text x="750" y="386" text-anchor="middle" font-size="7" fill="#aaa">broker.dispatch()</text>

  <!-- Arrow Redis Task Broker → Workers -->
  <line x1="860" y1="325" x2="918" y2="310" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="860" y1="345" x2="918" y2="345" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="860" y1="365" x2="918" y2="380" stroke="#999" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Worker 1 -->
  <rect x="920" y="285" width="100" height="50" rx="3" fill="#f5f5f5" stroke="#000" stroke-width="0.8"/>
  <text x="970" y="307" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">W1</text>
  <text x="970" y="322" text-anchor="middle" font-size="7" fill="#888">solver</text>

  <!-- Worker 2 -->
  <rect x="920" y="340" width="100" height="50" rx="3" fill="#f5f5f5" stroke="#000" stroke-width="0.8"/>
  <text x="970" y="362" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">W2</text>
  <text x="970" y="377" text-anchor="middle" font-size="7" fill="#888">field</text>

  <!-- Worker 3 -->
  <rect x="920" y="395" width="100" height="50" rx="3" fill="#f5f5f5" stroke="#000" stroke-width="0.8"/>
  <text x="970" y="417" text-anchor="middle" font-size="9" fill="#000" font-weight="bold">W3</text>
  <text x="970" y="432" text-anchor="middle" font-size="7" fill="#888">evidence</text>

  <!-- Pipeline event flow annotation -->
  <text x="80" y="470" font-size="7" fill="#aaa">Event flow: signal → parse → stream → write → recompute (avg. latency: 12ms p99)</text>
  <text x="80" y="482" font-size="7" fill="#aaa">Worker dispatch: planner → dag → broker → execute (avg. latency: 45ms p99)</text>

  <line x1="80" y1="500" x2="1120" y2="500" stroke="#e0e0e0" stroke-width="0.5"/>
  <text x="600" y="514" text-anchor="middle" font-size="7" fill="#bbb">Lattice9 Mutation Pipeline · Event-Driven Architecture · Redis Streams + Task DAG</text>
</svg>
</body>
</html>
